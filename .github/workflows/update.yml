name: Update GitHub Stars Catalog

on:
  schedule:
    # 00:00 UTC = 08:00 CST
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update stars catalog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: tyler5685
        run: python scripts/update_stars.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/*.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update stars catalog"
            git push
          fi
